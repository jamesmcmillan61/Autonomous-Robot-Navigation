slam_toolbox:
  ros__parameters:
    use_sim_time: true

    mode: mapping

    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan

    scan_queue_size: 1
    throttle_scans: 1

    map_update_interval: 2.0
    resolution: 0.05
    max_laser_range: 8.0

    transform_publish_period: 0.02
    tf_buffer_duration: 30.0

    use_map_saver: true
